; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:yolo_uno]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; ESP32-S3-N16R8 has 8MB Octal PSRAM — must declare qio_opi memory type so the
; bootloader initializes PSRAM and adds it to the heap_caps SPIRAM pool.
board_build.arduino.memory_type = qio_opi

; The ESP32 Arduino framework injects -std=gnu++11 into its own compiler flags 
; (in its platform.txt/boards.txt). PlatformIO applies those framework flags 
; after build_flags, so your -std=gnu++17 was being overridden.
; -------------------------------------------------------------------------------
; this tellsPlatformIO to strip that flag from wherever it appears 
; (framework flags included) before assembling the final command line, 
; so -std=gnu++17 is the only std flag that survives
build_unflags = -std=gnu++11

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D SSID_AP='"ESP32 LOCAL"'
    -D PASS_AP='12345678'
    -I lib/TensorFlowLite_ESP32/src/third_party/flatbuffers/include
    -I lib/TensorFlowLite_ESP32/src/third_party/gemmlowp
    -I lib/TensorFlowLite_ESP32/src/third_party/ruy
    -I lib/TensorFlowLite_ESP32/src/third_party/kissfft
    -std=gnu++17

lib_deps =
    adafruit/Adafruit NeoPixel @ 1.15.2
    robtillaart/DHT20 @ 0.3.2
    esp32async/ESPAsyncWebServer @ 3.9.6
    bblanchon/ArduinoJson @ 7.4.2
    TensorFlowLite_ESP32
    thingsboard/ThingsBoard @ 0.15.0
    bitbank2/JPEGDEC @ ^1.2.9