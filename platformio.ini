; PlatformIO Project Configuration File
;
; ┌──────────────────────────────────────────────────────────────────────────┐
; │  HOW TO SWITCH INFERENCE BACKENDS                                        │
; │  Change ONE line below — default_envs — then build/upload as normal.    │
; │    tinyml        →  TFLite Micro on-device model                         │
; │    ei_classifier →  Edge Impulse SDK EON compiled model                  │
; └──────────────────────────────────────────────────────────────────────────┘

[platformio]
default_envs = tinyml

; ─────────────────────────────────────────────────────────────────────────────
; Scalar settings inherited by every [env:*] (platform, board, etc.)
; ─────────────────────────────────────────────────────────────────────────────
[env]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; ESP32-S3-N16R8 has 8MB Octal PSRAM — must declare qio_opi memory type so the
; bootloader initializes PSRAM and adds it to the heap_caps SPIRAM pool.
board_build.arduino.memory_type = qio_opi

; The ESP32 Arduino framework injects -std=gnu++11 into its own compiler flags 
; (in its platform.txt/boards.txt). PlatformIO applies those framework flags 
; after build_flags, so your -std=gnu++17 was being overridden.
; -------------------------------------------------------------------------------
; this tellsPlatformIO to strip that flag from wherever it appears 
; (framework flags included) before assembling the final command line, 
; so -std=gnu++17 is the only std flag that survives
build_unflags = -std=gnu++11

; ─────────────────────────────────────────────────────────────────────────────
; Shared build flags and library deps — referenced by each env via interpolation
; ─────────────────────────────────────────────────────────────────────────────
[common]
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -D SSID_AP='"ESP32 LOCAL"'
    -D PASS_AP='12345678'
    -std=gnu++17

lib_deps =
    adafruit/Adafruit NeoPixel @ 1.15.2
    robtillaart/DHT20 @ 0.3.2
    esp32async/ESPAsyncWebServer @ 3.9.6
    bblanchon/ArduinoJson @ 7.4.2
    thingsboard/ThingsBoard @ 0.15.0
    bitbank2/JPEGDEC @ ^1.2.9

; ─────────────────────────────────────────────────────────────────────────────
; Backend: TinyML  (local TFLite Micro library)
; ─────────────────────────────────────────────────────────────────────────────
[env:tinyml]
build_flags =
    ${common.build_flags}
    -D ENABLE_TINYML
    -I lib/TensorFlowLite_ESP32/src/third_party/flatbuffers/include
    -I lib/TensorFlowLite_ESP32/src/third_party/gemmlowp
    -I lib/TensorFlowLite_ESP32/src/third_party/ruy
    -I lib/TensorFlowLite_ESP32/src/third_party/kissfft

lib_deps =
    ${common.lib_deps}
    TensorFlowLite_ESP32

; Exclude the EI library — its bundled TFLite would clash with TensorFlowLite_ESP32
lib_ignore = AIoT_Edge_Impulse

; ─────────────────────────────────────────────────────────────────────────────
; Backend: Edge Impulse SDK  (EON compiled model, float32, PSRAM arena)
; ─────────────────────────────────────────────────────────────────────────────
[env:ei_classifier]
build_flags =
    ${common.build_flags}
    -D ENABLE_EI_CLASSIFIER
    -D EI_CLASSIFIER_TFLITE_ENABLE_ESP_NN=1
    -D EIDSP_USE_ESP_DSP=1
    -D EI_CLASSIFIER_TFLITE_ENABLE_ESP_NN_S3=1
    -I lib/AIoT_Edge_Impulse/edge-impulse-sdk/porting/espressif/esp-dsp/modules/fft/include
    -I lib/AIoT_Edge_Impulse/edge-impulse-sdk/porting/espressif/esp-dsp/modules/common/include
    -I lib/AIoT_Edge_Impulse/tflite-model
    -I lib/AIoT_Edge_Impulse/model-parameters

lib_deps =
    ${common.lib_deps}
    AIoT_Edge_Impulse

; Exclude the local TFLite lib — AIoT_Edge_Impulse bundles its own copy
lib_ignore = TensorFlowLite_ESP32